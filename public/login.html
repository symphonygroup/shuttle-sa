<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F6F7FC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1A24" media="(prefers-color-scheme: dark)">
<title>Symphony Shuttle — Prijava</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F6F7FC;
    --surface: #FFFFFF;
    --accent: #6C69FF;
    --accent-dark: #4C4AB3;
    --text: #33333C;
    --text-body: #4F4F58;
    --muted: #62626E;
    --border: #E1E1E6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1A24;
      --surface: #22222E;
      --text: #F9F9FA;
      --text-body: #E1E1E6;
      --muted: #B3B3BA;
      --border: #4F4F58;
    }
  }
  body {
    background: var(--bg);
    color: var(--text-body);
    font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    letter-spacing: 0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .bus-icon {
    font-size: 3.5rem;
    margin-bottom: 1rem;
    display: block;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.25rem;
    letter-spacing: 0;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 2rem;
  }
  .error-msg {
    background: rgba(254, 116, 117, 0.1);
    border: 1px solid rgba(254, 116, 117, 0.3);
    color: #C74A52;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    margin-bottom: 1.5rem;
    display: none;
  }
  @media (prefers-color-scheme: dark) {
    .error-msg { color: #FFD5D6; }
  }
  .error-msg.show { display: block; }
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    background: var(--accent);
    color: #FFFFFF;
    text-decoration: none;
    border-radius: 12px;
    padding: 0.9rem 1.5rem;
    font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.15s, transform 0.1s;
    width: 100%;
  }
  .google-btn:active { transform: scale(0.98); background: var(--accent-dark); }
  .google-btn svg { flex-shrink: 0; }
  .domain-note {
    margin-top: 1.25rem;
    font-size: 12px;
    color: var(--muted);
  }
  .domain-note span {
    background: rgba(108, 105, 255, 0.12);
    color: var(--accent);
    padding: 0.1em 0.4em;
    border-radius: 4px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <span class="bus-icon">🚌</span>
  <h1>Symphony Shuttle</h1>
  <p class="subtitle">Rezervacijski sistem za zaposlenike</p>

  <div class="error-msg" id="errorMsg">
    Pristup dozvoljen samo za <strong>@symphony.is</strong> email adrese.
  </div>

  <a href="/auth/google" class="google-btn">
    <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
      <path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/>
    </svg>
    Prijavi se sa Google
  </a>

  <p class="domain-note">Samo za <span>@symphony.is</span> naloge</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'domain') {
    document.getElementById('errorMsg').classList.add('show');
  }
</script>
</body>
</html>
